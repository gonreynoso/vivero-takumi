<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vivero Takumi</title>
  </head>
  <body>
    <div id="root"></div>

    <!--
      Form estático oculto, solo para que el bot de Netlify lo detecte en build time.
      El formulario real de la página /contacto se envía por fetch a este mismo nombre.
    -->
    <form name="contacto" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="text" name="nombre" />
      <input type="email" name="email" />
      <textarea name="mensaje"></textarea>
      <input type="text" name="bot-field" />
    </form>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
